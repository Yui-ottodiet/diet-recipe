<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダイエット大全 レシピアプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f8f6f3;color:#1a1a1a;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding:1rem;padding-bottom:3rem}
.hero{border-radius:16px;padding:1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:14px;transition:background 0.3s}
.hero-icon{font-size:36px;flex-shrink:0}
.hero-text h2{font-size:15px;font-weight:600;margin-bottom:5px;line-height:1.4}
.hero-text p{font-size:12px;line-height:1.6}
.tabs{display:flex;margin-bottom:1.25rem;border:1px solid #e0ddd8;border-radius:10px;overflow:hidden;background:#fff}
.tab{flex:1;padding:10px 0;font-size:13px;font-weight:600;text-align:center;cursor:pointer;background:transparent;color:#888;border:none;transition:all 0.15s}
.tab.active-s{background:#FBEAF0;color:#72243E}
.tab.active-d{background:#E1F5EE;color:#0F6E56}
.tab:not(:last-child){border-right:1px solid #e0ddd8}
.sec-lbl{font-size:12px;font-weight:600;color:#aaa;letter-spacing:0.06em;margin-bottom:12px}
.card-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.5rem}
.rcard{background:#fff;border:1px solid #ede9e3;border-radius:14px;padding:12px;cursor:pointer;transition:all 0.15s}
.rcard:hover{border-color:#ccc;transform:translateY(-1px)}
.rcard:active{transform:translateY(0)}
.rcard-thumb{height:80px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:10px;overflow:hidden}
.rcard-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.rcard-title{font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.4;margin-bottom:7px}
.rcard-meta{display:flex;justify-content:space-between;align-items:center}
.rcard-kcal{font-size:11px;color:#aaa}
.fav-btn-sm{font-size:16px;cursor:pointer;background:none;border:none;padding:0;line-height:1}
.fav-on{color:#D4537E}.fav-off{color:#ccc}
.detail{display:none}.detail.on{display:block}
.list.off{display:none}
.back{font-size:13px;color:#993556;background:none;border:none;cursor:pointer;padding:0;margin-bottom:1.25rem;display:flex;align-items:center;gap:5px;font-weight:500}
.dhero{height:180px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:72px;margin-bottom:1rem;overflow:hidden}
.dhero img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.photo-strip{display:flex;gap:8px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
.photo-strip img{width:100px;height:80px;object-fit:cover;border-radius:10px;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s}
.photo-strip img.active{border-color:#D4537E}
.badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:8px;font-weight:600}
.badge-s{background:#FBEAF0;color:#72243E}
.badge-d{background:#E1F5EE;color:#0F6E56}
.dtitle{font-size:20px;font-weight:700;color:#1a1a1a;margin-bottom:6px;line-height:1.3}
.ddesc{font-size:13px;color:#666;line-height:1.7;margin-bottom:1rem}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:#f8f6f3;border-radius:10px;padding:10px;text-align:center}
.stat-v{font-size:15px;font-weight:700;color:#1a1a1a}
.stat-l{font-size:11px;color:#aaa;margin-top:3px}
.sec-h{font-size:13px;font-weight:700;color:#555;margin:1.25rem 0 8px;padding-bottom:6px;border-bottom:1px solid #ede9e3}
.ing-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.ing-row:last-child{border-bottom:none}
.ing-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ing-dot-s{background:#D4537E}
.ing-dot-d{background:#1D9E75}
.ing-n{color:#1a1a1a;flex:1}
.ing-a{color:#888;font-size:12px;font-weight:500}
.step-block{margin-bottom:16px}
.step-row{display:flex;gap:12px;margin-bottom:6px}
.step-n{width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-n-s{background:#FBEAF0;color:#72243E}
.step-n-d{background:#E1F5EE;color:#0F6E56}
.step-t{font-size:13px;color:#1a1a1a;line-height:1.7}
.step-photo{width:100%;border-radius:10px;margin-top:6px;object-fit:cover;max-height:220px;display:block}
.arrange-box{background:#f8f6f3;border-radius:12px;padding:14px;margin-top:1rem}
.arrange-label{font-size:11px;font-weight:700;color:#888;margin-bottom:12px;letter-spacing:0.04em}
.arrange-item{margin-bottom:14px}
.arrange-item:last-child{margin-bottom:0}
.arrange-photo{width:100%;border-radius:10px;margin-bottom:6px;object-fit:cover;max-height:180px;display:block}
.arrange-name{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#1a1a1a;line-height:1.6}
.arrange-bullet{color:#1D9E75;font-size:14px;flex-shrink:0}
.tip-box{border-radius:12px;padding:14px;margin-top:1rem;margin-bottom:1.5rem}
.tip-box-s{background:#FEF3E2}
.tip-box-d{background:#E8F5EE}
.tip-label{font-size:11px;font-weight:700;margin-bottom:5px;letter-spacing:0.04em}
.tip-label-s{color:#8B6200}
.tip-label-d{color:#1B6B3A}
.tip-text{font-size:13px;line-height:1.7}
.tip-text-s{color:#7A5500}
.tip-text-d{color:#1A5E34}
.tip-photo{width:100%;border-radius:10px;margin-top:10px;object-fit:cover;max-height:200px;display:block}
.fav-btn-lg{width:100%;padding:13px;border-radius:12px;border:2px solid #D4537E;background:transparent;color:#D4537E;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.15s}
.fav-btn-lg:hover{background:#FBEAF0}
.empty{font-size:14px;color:#aaa;text-align:center;padding:3rem 0}
.photo-strip::-webkit-scrollbar{height:4px}
.photo-strip::-webkit-scrollbar-track{background:#f0ede8;border-radius:2px}
.photo-strip::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="list" id="listWrap">
    <div class="hero" id="heroBox">
      <div class="hero-icon" id="heroIcon"></div>
      <div class="hero-text">
        <h2 id="heroTitle"></h2>
        <p id="heroDesc"></p>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active-s" onclick="switchTab('sweets',this)">おやつ</button>
      <button class="tab" onclick="switchTab('dish',this)">一品料理</button>
      <button class="tab" onclick="switchTab('fav',this)">お気に入り</button>
    </div>
    <div id="recipeList"></div>
  </div>

  <div class="detail" id="detailView">
    <button class="back" onclick="goBack()">← 一覧に戻る</button>
    <div class="dhero" id="dHero"></div>
    <div class="photo-strip" id="dPhotoStrip"></div>
    <div class="badge" id="dBadge"></div>
    <div class="dtitle" id="dTitle"></div>
    <div class="ddesc" id="dDesc"></div>
    <div class="stats">
      <div class="stat"><div class="stat-v" id="dTime"></div><div class="stat-l">調理時間</div></div>
      <div class="stat"><div class="stat-v" id="dKcal"></div><div class="stat-l">カロリー（概算）</div></div>
    </div>
    <div class="sec-h">材料</div>
    <div id="dIng"></div>
    <div class="sec-h">作り方</div>
    <div id="dSteps"></div>
    <div id="dArrange"></div>
    <div id="dTipWrap"></div>
    <button class="fav-btn-lg" id="dFavBtn" onclick="toggleDFav()">♡ お気に入りに追加</button>
  </div>
</div>

     {text:'焼き上がったら手でちぎって完成。',photo:'https://raw.githubusercontent.com/Yui-ottodiet/diet-recipe/main/%E3%81%A1%E3%81%8E%E3%82%8A%E9%A3%9F%E3%83%91%E3%83%B3%EF%BC%96.webp'},
   ],
   tip:{text:'ちぎり食パンは小さく見えますが食パン1枚分以上の重さがあります。お湯を牛乳に変えたりナッツを入れるとアレンジも楽しめます。',photo:''}}
];

let currentTab='sweets',currentR=null,favs=new Set();

function updateHero(tab){
  const h=heroData[tab]||heroData.sweets;
  document.getElementById('heroBox').style.background=h.bg;
  document.getElementById('heroIcon').textContent=h.icon;
  const title=document.getElementById('heroTitle');
  title.textContent=h.title;title.style.color=h.titleColor;
  const desc=document.getElementById('heroDesc');
  desc.textContent=h.desc;desc.style.color=h.descColor;
}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('active-s','active-d')});
  if(tab==='dish') el.classList.add('active-d');
  else el.classList.add('active-s');
  updateHero(tab);renderList();
}

function renderList(){
  const el=document.getElementById('recipeList');
  const filtered=R.filter(r=>currentTab==='fav'?favs.has(r.id):r.cat===currentTab);
  if(!filtered.length){el.innerHTML='<p class="empty">まだお気に入りがありません</p>';return;}
  const labels={sweets:'おやつレシピ',dish:'一品料理',fav:'お気に入り'};
  el.innerHTML=`<div class="sec-lbl">${labels[currentTab]} ${filtered.length}品</div><div class="card-grid">`+
    filtered.map(r=>{
      const hasPhoto=r.photos&&r.photos.length>0&&r.photos[0]!=='';
      const thumb=hasPhoto
        ?`<div class="rcard-thumb"><img src="${r.photos[0]}" alt="${r.title}" onerror="this.parentNode.innerHTML='${r.emoji}';this.parentNode.style.background='${r.bg}'"></div>`
        :`<div class="rcard-thumb" style="background:${r.bg}">${r.emoji}</div>`;
      return `<div class="rcard" onclick="showDetail(${r.id})">${thumb}
        <div class="rcard-title">${r.title}</div>
        <div class="rcard-meta">
          <span class="rcard-kcal">${r.kcal}</span>
          <button class="fav-btn-sm ${favs.has(r.id)?'fav-on':'fav-off'}" onclick="event.stopPropagation();toggleFav(${r.id})">${favs.has(r.id)?'♥':'♡'}</button>
        </div></div>`;
    }).join('')+'</div>';
}

function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);renderList();}

function showDetail(id){
  const r=R.find(x=>x.id===id);
  currentR=r;
  const isS=r.cat==='sweets';
  const hero=document.getElementById('dHero');
  const hasMainPhoto=r.photos&&r.photos.length>0&&r.photos[0]!=='';
  if(hasMainPhoto){
    hero.innerHTML=`<img src="${r.photos[0]}" alt="${r.title}" onerror="this.parentNode.textContent='${r.emoji}';this.parentNode.style.background='${r.bg}'">`;
    hero.style.background='transparent';
  } else {
    hero.textContent=r.emoji;
    hero.style.background=r.bg;
  }
  const strip=document.getElementById('dPhotoStrip');
  const validPhotos=(r.photos||[]).filter(p=>p!=='');
  if(validPhotos.length>1){
    strip.innerHTML=validPhotos.map((p,i)=>
      `<img src="${p}" alt="写真${i+1}" class="${i===0?'active':''}" onclick="changeMainPhoto('${p}',this)">`
    ).join('');
    strip.style.display='flex';
  } else {
    strip.innerHTML='';strip.style.display='none';
  }
  document.getElementById('dBadge').textContent=isS?'おやつ':'一品料理';
  document.getElementById('dBadge').className='badge '+(isS?'badge-s':'badge-d');
  document.getElementById('dTitle').textContent=r.title;
  document.getElementById('dDesc').textContent=r.desc;
  document.getElementById('dTime').textContent=r.time;
  document.getElementById('dKcal').textContent=r.kcal;
  const dotClass=isS?'ing-dot ing-dot-s':'ing-dot ing-dot-d';
  document.getElementById('dIng').innerHTML=r.ing.map(i=>
    `<div class="ing-row"><div class="${dotClass}"></div><span class="ing-n">${i.n}</span><span class="ing-a">${i.a}</span></div>`
  ).join('');
  const snClass=isS?'step-n-s':'step-n-d';
  document.getElementById('dSteps').innerHTML=r.steps.map((s,i)=>{
    const photoHtml=s.photo?`<img src="${s.photo}" alt="手順${i+1}" class="step-photo" onerror="this.style.display='none'">`:'';
    return `<div class="step-block"><div class="step-row"><div class="step-n ${snClass}">${i+1}</div><div class="step-t">${s.text}</div></div>${photoHtml}</div>`;
  }).join('');
  const arrangeEl=document.getElementById('dArrange');
  if(r.arrange&&r.arrange.length>0){
    arrangeEl.innerHTML=`<div class="arrange-box"><div class="arrange-label">アレンジアイデア</div>`+
      r.arrange.map(a=>{
        const photoHtml=a.photo?`<img src="${a.photo}" alt="${a.name}" class="arrange-photo" onerror="this.style.display='none'">`:'';
        return `<div class="arrange-item">${photoHtml}<div class="arrange-name"><span class="arrange-bullet">✦</span><span>${a.name}</span></div></div>`;
      }).join('')+`</div>`;
  } else {arrangeEl.innerHTML='';}
  const tipWrap=document.getElementById('dTipWrap');
  if(r.tip){
    const boxClass=isS?'tip-box tip-box-s':'tip-box tip-box-d';
    const lblClass=isS?'tip-label tip-label-s':'tip-label tip-label-d';
    const txtClass=isS?'tip-text tip-text-s':'tip-text tip-text-d';
    const tipPhotoHtml=r.tip.photo
      ?`<img src="${r.tip.photo}" alt="ワンポイント" class="tip-photo" onerror="this.style.display='none'">`
      :'';
    tipWrap.innerHTML=`<div class="${boxClass}"><div class="${lblClass}">ワンポイントアドバイス</div><div class="${txtClass}">${r.tip.text}</div>${tipPhotoHtml}</div>`;
  } else {tipWrap.innerHTML='';}
  document.getElementById('dFavBtn').textContent=favs.has(id)?'♥ お気に入り済み':'♡ お気に入りに追加';
  document.getElementById('listWrap').classList.add('off');
  document.getElementById('detailView').classList.add('on');
  window.scrollTo(0,0);
}

function changeMainPhoto(url,el){
  const hero=document.getElementById('dHero');
  hero.innerHTML=`<img src="${url}" alt="メイン写真">`;
  document.querySelectorAll('.photo-strip img').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

function toggleDFav(){
  const id=currentR.id;
  favs.has(id)?favs.delete(id):favs.add(id);
  document.getElementById('dFavBtn').textContent=favs.has(id)?'♥ お気に入り済み':'♡ お気に入りに追加';
}

function goBack(){
  document.getElementById('listWrap').classList.remove('off');
  document.getElementById('detailView').classList.remove('on');
  window.scrollTo(0,0);
  renderList();
}

updateHero('sweets');renderList();
</script>
</body>
</html>
